<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NearPop — Local Store</title>
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
  html, body { 
    background: #ffffff !important; 
    margin: 0 !important; 
    padding: 0 !important; 
    font-family: 'Nunito', sans-serif !important; 
    -webkit-tap-highlight-color: transparent !important; 
    color: #111827;
  }

  #wrap { 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh; 
    max-width: 500px; 
    margin: 0 auto; 
    background: #ffffff; 
    padding-bottom: 80px; 
  }

  /* ─── Top Nav Bar ─── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .top-btn {
    background: transparent;
    border: none;
    font-size: 22px;
    color: #374151;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .top-actions {
    display: flex;
    gap: 16px;
  }

  /* ─── Store Header ─── */
  .store-hdr {
    display: flex;
    align-items: center;
    padding: 0 20px 20px;
    gap: 16px;
  }
  .s-logo-box {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: #064E3B; /* Fallback green */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  .s-logo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .s-info { flex: 1; }
  .s-name {
    font-size: 24px;
    font-weight: 800;
    margin: 0 0 2px 0;
    line-height: 1.2;
    color: #111827;
  }
  .s-cat {
    font-size: 14px;
    color: #6B7280;
    font-weight: 600;
    margin: 0 0 4px 0;
  }

  /* ─── Action Buttons ─── */
  .action-row {
    display: flex;
    gap: 12px;
    padding: 0 20px 20px;
  }
  .act-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 0;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .act-btn:active { transform: scale(0.96); }
  
  .btn-call { background: #22C55E; color: #fff; border: none; }
  .btn-follow { background: #fff; color: #F97316; border: 1.5px solid #F97316; }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    border-bottom: 1px solid #E5E7EB;
    padding: 0 20px;
    gap: 24px;
    justify-content: flex-end; /* Align right as in image */
  }
  .tab {
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 800;
    color: #6B7280;
    cursor: pointer;
    position: relative;
  }
  .tab.active {
    color: #F97316;
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 3px;
    background: #F97316;
    border-radius: 3px 3px 0 0;
  }

  /* ─── Product/Offer List ─── */
  #content {
    padding: 10px 20px 20px;
  }
  
  .item-row {
    display: flex;
    padding: 16px 0;
    border-bottom: 1px solid #F3F4F6;
    cursor: pointer;
    transition: background 0.15s;
  }
  .item-row:active { background: #F9FAFB; }
  .item-row:last-child { border-bottom: none; }

  .item-img {
    width: 86px;
    height: 86px;
    border-radius: 12px;
    object-fit: cover;
    background: #F3F4F6;
    margin-right: 16px;
    border: 1px solid #E5E7EB;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  
  .item-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .item-ti {
    font-size: 16px;
    font-weight: 800;
    color: #111827;
    margin-bottom: 2px;
  }
  .item-desc {
    font-size: 13px;
    color: #6B7280;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item-price-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-top: auto;
  }
  .item-price {
    font-size: 18px;
    font-weight: 900;
    color: #16A34A; /* Bold Green */
  }
  .item-unit {
    font-size: 13px;
    color: #4B5563;
    font-weight: 600;
  }

  /* ─── Bottom Navigation Mock ─── */
  .btm-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: #fff;
    border-top: 1px solid #F3F4F6;
    display: flex;
    justify-content: space-around;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #9CA3AF;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: color 0.2s;
  }
  .nav-item:active { transform: scale(0.95); }
  .nav-item.active { color: #F97316; }
  .nav-ic { font-size: 22px; }

  /* Utilities */
  .skeleton {
    background: linear-gradient(90deg, #F3F4F6 25%, #E5E7EB 50%, #F3F4F6 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite linear;
    border-radius: 8px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .zero-box { padding: 40px 20px; text-align: center; }
</style>
</head>
<body>

<div id="wrap">
  
  <div class="top-bar">
    <button class="top-btn" onclick="window.location.href='map.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="top-actions">
      <button class="top-btn" onclick="window.shareStore()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      </button>
      <button class="top-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
      </button>
    </div>
  </div>

  <div class="store-hdr">
    <div class="s-logo-box">
      <img src="icons/logo.png" id="s-logo-img" alt="Store Logo">
    </div>
    <div class="s-info">
      <h1 class="s-name" id="s-name">Loading...</h1>
      <p class="s-cat" id="s-cat">Local Business</p>
    </div>
  </div>

  <div class="action-row">
    <button class="act-btn btn-call" onclick="window.callStore()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg> 
      Call
    </button>
    <button class="act-btn btn-follow" onclick="window.claimVisitPoints()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      Follow
    </button>
  </div>

  <div class="tabs">
    <div class="tab active">Offers</div>
  </div>

  <div id="content">
    <div class="item-row" style="border:none;">
      <div class="item-img skeleton"></div>
      <div class="item-info">
        <div class="skeleton" style="width:70%; height:18px; margin-bottom:8px;"></div>
        <div class="skeleton" style="width:90%; height:14px; margin-bottom:12px;"></div>
        <div class="skeleton" style="width:40%; height:20px;"></div>
      </div>
    </div>
  </div>

  <div class="btm-nav">
    <div class="nav-item" onclick="window.location.href='home.html'"><span class="nav-ic">🏠</span>Home</div>
    <div class="nav-item"><span class="nav-ic">🔍</span>Search</div>
    <div class="nav-item active"><span class="nav-ic">🏷️</span>Offers</div>
    <div class="nav-item"><span class="nav-ic">♡</span>Saved</div>
    <div class="nav-item" onclick="window.location.href='profile.html'"><span class="nav-ic">👤</span>Profile</div>
  </div>

</div>

<script type="module">
  import { db, toast, TE, LS } from './js/app.js';
  import { doc, getDoc, collection, query, where, getDocs, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

  let storePhone = '';

  async function initStore() {
    const urlParams = new URLSearchParams(window.location.search);
    const mid = urlParams.get('mid');

    urlParams.delete('mid');
    const trackingTags = urlParams.toString() ? `&${urlParams.toString()}` : '';

    const content = document.getElementById('content');
    const nameEl = document.getElementById('s-name');

    if (!mid) {
      nameEl.textContent = "Oops!";
      content.innerHTML = `<div class="zero-box"><h3 style="margin-bottom:8px;">Store Not Found</h3><p style="color:#6B7280; font-size:14px;">Please scan a valid NearPop QR code.</p></div>`;
      return;
    }

    // QR Analytics
    if (!sessionStorage.getItem('np_scanned_' + mid)) {
      updateDoc(doc(db, 'users', mid), { qrScans: increment(1) }).catch(e => console.warn(e));
      sessionStorage.setItem('np_scanned_' + mid, 'true');
    }

    try {
      // 1. Fetch Store Data
      const userDoc = await getDoc(doc(db, 'users', mid));
      const userData = userDoc.exists() ? userDoc.data() : {};

      const mname = userData.mname || 'Local Store';
      const mlogo = userData.logoUrl || 'icons/logo.png';
      storePhone = userData.phone || '';
      
      nameEl.textContent = mname;
      document.getElementById('s-logo-img').src = mlogo;
      
      if (userData.category) {
        document.getElementById('s-cat').textContent = userData.category;
      }

      // 2. Fetch Active Offers
      const q = query(collection(db, 'listings'), where('uid', '==', mid), where('status', '==', 'active'));
      const snap = await getDocs(q);
      const listings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      if (listings.length > 0) {
        let html = '';

        listings.forEach(l => {
          // Format image or emoji placeholder
          const imgHtml = (l.imageUrl || l.image) 
            ? `<img src="${l.imageUrl || l.image}" class="item-img" alt="Product">` 
            : `<div class="item-img" style="background:#F3F4F6;">${l.emoji || TE(l.type)}</div>`;
          
          // Format Price strictly to match the new image (Green Price + Unit)
          let priceVal = l.price || 'Special Deal';
          
          // Try to extract just the numbers to format cleanly with the rupee symbol
          const numMatch = String(priceVal).match(/\d+/);
          if (numMatch && !String(priceVal).includes('₹')) {
             priceVal = '₹' + priceVal;
          }

          const unitStr = l.unit ? `<span class="item-unit">/ ${l.unit}</span>` : '';
          const desc = l.desc ? l.desc.replace('\n', '<br>') : 'Locally sourced product.';

          html += `
            <div class="item-row" onclick="window.location.href='detail.html?id=${l.id}${trackingTags}'">
              ${imgHtml}
              <div class="item-info">
                <div class="item-ti">${l.title}</div>
                <div class="item-desc">${desc}</div>
                <div class="item-price-row">
                  <span class="item-price">${priceVal}</span> 
                  ${unitStr}
                </div>
              </div>
            </div>
          `;
        });

        content.innerHTML = html;

      } else {
        content.innerHTML = `
          <div class="zero-box">
            <h3 style="margin-bottom:8px; color:#111827;">Welcome to ${mname}!</h3>
            <p style="color:#6B7280; font-size:14px; margin-bottom:20px;">No active discount offers right now.</p>
          </div>
        `;
      }
    } catch (e) {
      console.error(e);
      nameEl.textContent = "Error";
      content.innerHTML = `<div class="zero-box"><p>Could not connect to store.</p></div>`;
    }
  }

  window.callStore = () => {
    if (storePhone) {
      window.location.href = `tel:${storePhone}`;
    } else {
      toast('📞', 'Phone number not provided by store.');
    }
  };

  // Native Share API
  window.shareStore = async () => {
    const storeName = document.getElementById('s-name').textContent;
    if (navigator.share) {
      try {
        await navigator.share({
          title: storeName,
          text: `Check out live offers from ${storeName} on NearPop!`,
          url: window.location.href
        });
      } catch (err) {
        console.log('Share sheet closed');
      }
    } else {
      navigator.clipboard.writeText(window.location.href);
      toast('🔗', 'Store link copied!');
    }
  };

  window.claimVisitPoints = () => {
    toast('⭐', 'Followed! You will get updates from this store.');
  };

  initStore();
</script>
</body>
</html>
