<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NearPop — Local Store</title>
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
  /* 🚀 Scrolling Fix Enforced */
  html, body { 
    background: #ffffff !important; 
    margin: 0 !important; 
    padding: 0 !important; 
    font-family: 'Nunito', sans-serif !important; 
    -webkit-tap-highlight-color: transparent !important; 
    color: #111827;
    overflow-y: auto !important; 
    height: auto !important;
    min-height: 100vh !important;
  }

  #wrap { 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh; 
    max-width: 500px; 
    margin: 0 auto; 
    background: #ffffff; 
    padding-bottom: 90px; 
    overflow-y: auto !important; 
    height: auto !important;
  }

  /* ─── Top Nav Bar ─── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .top-btn {
    background: transparent;
    border: none;
    color: #374151;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px; /* Fixed width to keep center aligned */
  }
  
  .top-logo-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    height: 28px;
  }

  /* ─── Store Header ─── */
  .store-hdr {
    display: flex;
    align-items: center;
    padding: 0 20px 20px;
    gap: 16px;
  }
  .s-logo-box {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: #064E3B;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }
  .s-logo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .s-info { flex: 1; }
  .s-name {
    font-size: 24px;
    font-weight: 800;
    margin: 0 0 2px 0;
    line-height: 1.2;
    color: #111827;
  }
  .s-partner-tag {
    font-size: 13px;
    color: #F97316;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── Tabs & Search ─── */
  .tabs {
    display: flex;
    border-bottom: 1px solid #E5E7EB;
    padding: 0 20px;
    gap: 24px;
    justify-content: flex-start;
  }
  .tab {
    padding: 12px 16px 12px 0;
    font-size: 16px;
    font-weight: 800;
    color: #6B7280;
    cursor: pointer;
    position: relative;
  }
  .tab.active {
    color: #F97316;
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: calc(100% - 16px);
    height: 3px;
    background: #F97316;
    border-radius: 3px 3px 0 0;
  }

  .search-wrap {
    padding: 15px 20px 5px;
    display: none; /* Hidden by default */
  }
  .search-box {
    background: #F3F4F6;
    border-radius: 12px;
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
  }
  .search-box input {
    border: none;
    background: transparent;
    width: 100%;
    outline: none;
    font-size: 15px;
    font-family: inherit;
    color: #111827;
    font-weight: 600;
  }
  .search-box input::placeholder {
    color: #9CA3AF;
  }

  /* ─── Product/Offer List ─── */
  #content {
    padding: 0 20px 20px;
  }
  
  .item-row {
    display: flex;
    padding: 16px 0;
    border-bottom: 1px solid #F3F4F6;
    cursor: pointer;
    transition: background 0.15s;
    align-items: center;
  }
  .item-row:active { background: #F9FAFB; }
  .item-row:last-child { border-bottom: none; }

  .item-img {
    width: 86px;
    height: 86px;
    border-radius: 12px;
    object-fit: cover;
    background: #F3F4F6;
    margin-right: 16px;
    border: 1px solid #E5E7EB;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  
  .item-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .item-ti {
    font-size: 16px;
    font-weight: 800;
    color: #111827;
    margin-bottom: 2px;
  }
  .item-desc {
    font-size: 13px;
    color: #6B7280;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item-price-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-top: auto;
  }
  .item-price {
    font-size: 18px;
    font-weight: 900;
    color: #16A34A;
  }
  .item-unit {
    font-size: 13px;
    color: #4B5563;
    font-weight: 600;
  }

  .item-like {
    font-size: 22px;
    padding: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .item-like:active { transform: scale(0.8); }

  /* ─── Bottom Navigation ─── */
  .btm-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: #fff;
    border-top: 1px solid #F3F4F6;
    display: flex;
    justify-content: space-around;
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #9CA3AF;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: color 0.2s;
  }
  .nav-item:active { transform: scale(0.95); }
  .nav-item.active { color: #F97316; }
  .nav-ic { font-size: 22px; }

  /* Utilities */
  .skeleton {
    background: linear-gradient(90deg, #F3F4F6 25%, #E5E7EB 50%, #F3F4F6 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite linear;
    border-radius: 8px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .zero-box { padding: 40px 20px; text-align: center; }
</style>
</head>
<body>

<div id="wrap">
  
  <div class="top-bar">
    <button class="top-btn" onclick="window.location.href='map.html'" title="Back to Map">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    
    <img src="icons/logo.png" alt="NearPop" class="top-logo-center">
    
    <button class="top-btn" onclick="window.shareStore()" style="justify-content: flex-end;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
    </button>
  </div>

  <div class="store-hdr">
    <div class="s-logo-box">
      <img src="icons/logo.png" id="s-logo-img" alt="Store Logo">
    </div>
    <div class="s-info">
      <h1 class="s-name" id="s-name">Loading...</h1>
      <div class="s-partner-tag">NearPop Local Partner</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active">Offers</div>
  </div>

  <div class="search-wrap" id="search-container">
    <div class="search-box">
      <span style="font-size: 16px; opacity: 0.6;">🔍</span>
      <input type="text" id="deal-search" placeholder="Search offers..." onkeyup="window.filterDeals()">
    </div>
  </div>

  <div id="content">
    <div class="item-row deal-card" style="border:none;">
      <div class="item-img skeleton"></div>
      <div class="item-info">
        <div class="skeleton" style="width:70%; height:18px; margin-bottom:8px;"></div>
        <div class="skeleton" style="width:90%; height:14px; margin-bottom:12px;"></div>
        <div class="skeleton" style="width:40%; height:20px;"></div>
      </div>
    </div>
    <div id="no-results" style="display:none; text-align:center; padding: 30px 20px; color: #6B7280; font-weight: 700; font-size: 15px;">
      No offers match your search.
    </div>
  </div>

  <div class="btm-nav">
    <div class="nav-item" onclick="window.location.href='map.html'">
      <span class="nav-ic">🏠</span>Home
    </div>
    <div class="nav-item" id="nav-search-btn" onclick="window.toggleSearch()">
      <span class="nav-ic">🔍</span>Search
    </div>
    <div class="nav-item" id="nav-saved-btn" onclick="window.toggleSaved()">
      <span class="nav-ic" id="saved-icon">♡</span>Saved
    </div>
    <div class="nav-item" onclick="window.location.href='profile.html'">
      <span class="nav-ic">👤</span>Profile
    </div>
  </div>

</div>

<script type="module">
  import { db, toast, TE, LS, SS, addPts } from './js/app.js';
  import { syncField } from './js/userSync.js';
  import { doc, getDoc, collection, query, where, getDocs, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

  // Global variables for search & filtering
  window.isShowingSaved = false;

  async function initStore() {
    const urlParams = new URLSearchParams(window.location.search);
    const mid = urlParams.get('mid');

    urlParams.delete('mid');
    const trackingTags = urlParams.toString() ? `&${urlParams.toString()}` : '';

    const content = document.getElementById('content');
    const nameEl = document.getElementById('s-name');

    if (!mid) {
      nameEl.textContent = "Oops!";
      content.innerHTML = `<div class="zero-box"><h3 style="margin-bottom:8px;">Store Not Found</h3><p style="color:#6B7280; font-size:14px;">Please scan a valid NearPop QR code.</p></div>`;
      return;
    }

    // QR Analytics
    if (!sessionStorage.getItem('np_scanned_' + mid)) {
      updateDoc(doc(db, 'users', mid), { qrScans: increment(1) }).catch(e => console.warn(e));
      sessionStorage.setItem('np_scanned_' + mid, 'true');
    }

    try {
      // 1. Fetch Store Data
      const userDoc = await getDoc(doc(db, 'users', mid));
      const userData = userDoc.exists() ? userDoc.data() : {};

      const mname = userData.mname || 'Local Store';
      const mlogo = userData.logoUrl || 'icons/logo.png';
      
      nameEl.textContent = mname;
      document.getElementById('s-logo-img').src = mlogo;

      // 2. Fetch Active Offers
      const q = query(collection(db, 'listings'), where('uid', '==', mid), where('status', '==', 'active'));
      const snap = await getDocs(q);
      const listings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      if (listings.length > 0) {
        let html = '';
        const likedIds = LS('liked') || [];

        listings.forEach(l => {
          const searchString = `${l.title} ${l.price} ${l.type} ${l.desc}`.toLowerCase();

          const imgHtml = (l.imageUrl || l.image) 
            ? `<img src="${l.imageUrl || l.image}" class="item-img" alt="Product">` 
            : `<div class="item-img" style="background:#F3F4F6;">${l.emoji || TE(l.type)}</div>`;
          
          let priceVal = l.price || 'Special Deal';
          const numMatch = String(priceVal).match(/\d+/);
          if (numMatch && !String(priceVal).includes('₹')) {
             priceVal = '₹' + priceVal;
          }

          const unitStr = l.unit ? `<span class="item-unit">/ ${l.unit}</span>` : '';
          const desc = l.desc ? l.desc.replace('\n', '<br>') : 'Locally sourced product.';
          
          const isLiked = likedIds.includes(l.id);
          const likeHtml = `<div class="item-like" onclick="event.stopPropagation(); window.toggleLike('${l.id}', this)">${isLiked ? '❤️' : '🤍'}</div>`;

          html += `
            <div class="item-row deal-card" data-search="${searchString}" data-id="${l.id}" onclick="window.location.href='detail.html?id=${l.id}${trackingTags}'">
              ${imgHtml}
              <div class="item-info">
                <div class="item-ti">${l.title}</div>
                <div class="item-desc">${desc}</div>
                <div class="item-price-row">
                  <span class="item-price">${priceVal}</span> 
                  ${unitStr}
                </div>
              </div>
              ${likeHtml}
            </div>
          `;
        });
        
        html += `<div id="no-results" style="display:none; text-align:center; padding: 30px 20px; color: #6B7280; font-weight: 700; font-size: 15px;">No offers match your search.</div>`;
        content.innerHTML = html;

      } else {
        content.innerHTML = `
          <div class="zero-box">
            <h3 style="margin-bottom:8px; color:#111827;">Welcome to ${mname}!</h3>
            <p style="color:#6B7280; font-size:14px; margin-bottom:20px;">No active discount offers right now.</p>
          </div>
        `;
      }
    } catch (e) {
      console.error(e);
      nameEl.textContent = "Error";
      content.innerHTML = `<div class="zero-box"><p>Could not connect to store.</p></div>`;
    }
  }

  // 🚀 Toggle Like/Save Logic
  window.toggleLike = (id, el) => {
    if (navigator.vibrate) navigator.vibrate(30);
    
    const liked = new Set(LS('liked') || []);
    const wasLiked = liked.has(id);
    
    if (wasLiked) {
      liked.delete(id);
      el.textContent = '🤍';
    } else {
      liked.add(id);
      el.textContent = '❤️';
      toast('❤️', 'Saved to your profile!');
      if (typeof addPts === 'function') addPts(10);
    }
    
    const newLikedArray = [...liked];
    SS('liked', newLikedArray);
    
    // Attempt cloud sync if available
    try {
      const uid = LS('uid');
      if (uid && typeof syncField === 'function') {
        syncField(uid, 'liked', newLikedArray);
      }
    } catch(e) {}
    
    // If user is currently viewing the "Saved" filter, refresh the list to hide it
    if (window.isShowingSaved && wasLiked) {
      window.filterDeals();
    }
  };

  // 🚀 Toggle Search Bar
  window.toggleSearch = () => {
    const searchWrap = document.getElementById('search-container');
    const searchBtn = document.getElementById('nav-search-btn');
    const input = document.getElementById('deal-search');

    if (searchWrap.style.display === 'none' || searchWrap.style.display === '') {
      searchWrap.style.display = 'block';
      searchBtn.classList.add('active');
      input.focus();
    } else {
      searchWrap.style.display = 'none';
      searchBtn.classList.remove('active');
      input.value = '';
      window.filterDeals();
    }
  };

  // 🚀 Live Search & Filter Function
  window.filterDeals = () => {
    const query = document.getElementById('deal-search').value.toLowerCase();
    const cards = document.querySelectorAll('.deal-card');
    const liked = LS('liked') || [];
    let visibleCount = 0;

    cards.forEach(card => {
      const id = card.getAttribute('data-id');
      const searchData = card.getAttribute('data-search');
      
      const matchesSearch = searchData.includes(query);
      const matchesSaved = window.isShowingSaved ? liked.includes(id) : true;

      if (matchesSearch && matchesSaved) {
        card.style.display = 'flex';
        visibleCount++;
      } else {
        card.style.display = 'none';
      }
    });

    const noResultsEl = document.getElementById('no-results');
    if (noResultsEl) {
      noResultsEl.style.display = visibleCount === 0 ? 'block' : 'none';
      if (visibleCount === 0) {
        noResultsEl.textContent = (window.isShowingSaved && query === '') 
          ? "You haven't saved any offers from this store yet." 
          : "No offers match your search.";
      }
    }
  };

  // 🚀 Smart Saved Toggle Function
  window.toggleSaved = () => {
    if (navigator.vibrate) navigator.vibrate(30);
    window.isShowingSaved = !window.isShowingSaved;
    
    const btn = document.getElementById('nav-saved-btn');
    const icon = document.getElementById('saved-icon');
    
    if (window.isShowingSaved) {
      btn.classList.add('active');
      icon.innerHTML = '❤️';
      toast('❤️', 'Showing your saved offers');
    } else {
      btn.classList.remove('active');
      icon.innerHTML = '♡';
    }
    
    window.filterDeals();
  };

  // Native Share API
  window.shareStore = async () => {
    const storeName = document.getElementById('s-name').textContent;
    if (navigator.share) {
      try {
        await navigator.share({
          title: storeName,
          text: `Check out live offers from ${storeName} on NearPop!`,
          url: window.location.href
        });
      } catch (err) {
        console.log('Share sheet closed');
      }
    } else {
      navigator.clipboard.writeText(window.location.href);
      toast('🔗', 'Store link copied!');
    }
  };

  initStore();
</script>
</body>
</html>
