<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  ✅ FIX 1 (CRITICAL — Viewport): Added maximum-scale=1, user-scalable=no.
  Without this, Android WebView zooms into focused inputs (email fields, etc.)
  and the card jumps behind the keyboard, making only the top few pixels visible.
  viewport-fit=cover ensures content reaches behind notch/punch-hole cameras.
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0F0F13">
<meta name="color-scheme" content="light dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="google-site-verification" content="G5cM83TAmDMQ01Q4iaAEMiq3d8Q4pE5UeN5ljGJ50uk" />

<title>NearPop — Discover Local Deals, Rentals &amp; Jobs Instantly</title>
<meta name="title" content="NearPop — Discover Local Deals, Rentals & Jobs Instantly">
<meta name="description" content="Turn on your GPS and find the best hyper-local shop discounts, flats, PGs, and jobs near you in real-time. Explore your neighborhood with NearPop.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://nearpop.in/">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!--
  ✅ FIX 2: Service Worker — only register outside Android WebView.
  WebView has no SW support. The failed SW registration spammed console errors
  and blocked the page's JS module parsing on some WebView versions.
-->
<script>
  const isAndroidWebView = /wv/.test(navigator.userAgent) ||
    (navigator.userAgent.includes('Android') && !navigator.userAgent.includes('Chrome/') &&
     !navigator.userAgent.includes('Firefox/'));

  if ('serviceWorker' in navigator && !isAndroidWebView) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
    });
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Syne:wght@700;800&display=swap">
<link rel="stylesheet" href="css/shared.css">

<style>
  /*
    ✅ FIX 3 (CRITICAL — Layout): body was overflow:hidden which clipped the
    login card when the soft keyboard pushed the viewport up. Changed to
    overflow-y:auto and min-height uses -webkit-fill-available for WebView
    compatibility (100dvh is not supported in older WebView versions).
  */
  html, body {
    margin: 0;
    padding: 0;
    /* Fallback for WebView which doesn't always honour 100dvh */
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: var(--bg-body);
    padding: 16px;
    /* ✅ FIX: was overflow:hidden — now scrollable so card is reachable on
       small screens or when keyboard is open */
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
  }

  /*
    ✅ FIX 4 (CRITICAL — z-index stacking context):
    The original .premium-bg had z-index:0 and .card had z-index:10 BUT
    there was no explicit stacking context on body, so on certain WebView
    versions the backdrop-filter on .card created a NEW stacking context that
    got rendered BELOW the fixed background layer.

    Solution: give body a stacking context via isolation:isolate, and raise
    .card's z-index well above the overlay pseudo-element.
  */
  body {
    isolation: isolate; /* ← creates root stacking context */
  }

  .premium-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background-image 1s ease-in-out;
    /* Fallback color while image loads */
    background-color: #1a1a2e;
  }

  .premium-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    /* z-index: 1 inside .premium-bg stacking context — fine */
    background: rgba(0, 0, 0, 0.45);
  }

  /*
    ✅ FIX 5: backdrop-filter: blur() is NOT supported in Android WebView
    below Chrome 76 (WebView 76). Adding a solid fallback background so
    the card is never transparent/invisible on older devices.
    Also raised z-index to 100 to guarantee it's above everything.
  */
  .card {
    width: 100%;
    max-width: 400px;
    border-radius: 28px;
    padding: 40px 24px;
    text-align: center;
    position: relative;
    z-index: 100; /* ✅ Was 10; raised to guarantee above fixed bg */
    /* Solid fallback for WebView no-backdrop-filter */
    background-color: rgba(255, 255, 255, 0.95);
    /* Progressive enhancement: blur where supported */
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    box-shadow:
      0 30px 60px rgba(0, 0, 0, 0.25),
      0 0 0 1px rgba(255, 255, 255, 0.4) inset;
    border: none;
    animation: slideUpFade 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    /* ✅ FIX: Ensure card never overflows the viewport horizontally */
    box-sizing: border-box;
  }

  @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-color-scheme: dark) {
    .premium-bg::after { background: rgba(0, 0, 0, 0.6); }
    .card {
      background-color: rgba(15, 15, 19, 0.92); /* ✅ More opaque fallback in dark mode */
      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }
  }

  /* ✅ FIX 6: Small-screen guard — tighten padding on tiny phones */
  @media (max-height: 640px) {
    .card { padding: 24px 20px; border-radius: 20px; }
    .tagline { margin-bottom: 18px !important; }
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .tagline {
    font-size: 14px;
    color: var(--gray);
    font-weight: 600;
    margin-bottom: 30px;
    line-height: 1.4;
  }

  /* ─── Role Toggle ───────────────────────────────────────────────────────── */
  .role-tog {
    display: flex;
    position: relative;
    background: var(--cream);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 24px;
    border: 1px solid var(--bdr);
    /* ✅ FIX: Give toggle its own stacking context so sliding-pill z-index
       is relative to the toggle box only — avoids clipping by parent contexts */
    isolation: isolate;
  }

  .sliding-pill {
    position: absolute;
    top: 4px;
    bottom: 4px;
    left: 4px;
    width: calc(50% - 4px);
    background: var(--bg-app);
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 0; /* Stays behind text within toggle's isolation context */
  }

  .rtb {
    flex: 1;
    padding: 10px;
    font-size: 13px;
    font-weight: 800;
    color: var(--gray);
    border-radius: 10px;
    cursor: pointer;
    transition: color 0.2s;
    background: transparent;
    position: relative;
    z-index: 1; /* ✅ FIX: was missing — text needs to sit above pill */
    user-select: none;
    -webkit-user-select: none; /* WebView requires -webkit prefix */
  }

  .rtb.on { color: var(--deep); }

  /* ─── Google Button ─────────────────────────────────────────────────────── */
  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: var(--bg-app);
    color: var(--deep);
    font-size: 15px;
    font-weight: 800;
    border: 2px solid var(--bdr);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    /* ✅ FIX: min-height prevents button from collapsing on WebView layout pass */
    min-height: 52px;
    box-sizing: border-box;
  }
  .btn-google:active { transform: scale(0.97); background: var(--cream); }
  .btn-google img { width: 20px; height: 20px; flex-shrink: 0; }
  .btn-google:disabled { opacity: 0.7; cursor: not-allowed; }

  @keyframes inline-spin { 100% { transform: rotate(360deg); } }

  /* ─── Checkbox ──────────────────────────────────────────────────────────── */
  .checkbox-wrapper {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 20px;
    text-align: left;
    padding: 0 4px;
  }
  .custom-checkbox {
    width: 20px;
    height: 20px;
    accent-color: #FF5722;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    -webkit-appearance: auto;
    transition: transform 0.2s;
  }
  .custom-checkbox:active { transform: scale(0.9); }

  /* ─── Footer links ──────────────────────────────────────────────────────── */
  .page-footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    z-index: 100; /* ✅ Match card z-index so it's visible above bg */
    position: relative;
  }
</style>
</head>
<body>

<div class="premium-bg" id="dynamic-bg"></div>

<div class="card" id="login-card">
  <div class="brand" style="margin-bottom: 20px;">
    <img
      src="icons/logo.png"
      alt="NearPop Logo"
      style="max-height: 64px; width: auto; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));"
      onerror="this.style.display='none'"
    >
  </div>
  <div class="tagline" id="tag-line">Sign in to discover nearby deals instantly.</div>

  <div class="role-tog" id="role-box">
    <div class="sliding-pill" id="role-pill"></div>
    <div class="rtb on" id="rt-con" onclick="setRole('consumer')">📱 Customer</div>
    <div class="rtb"    id="rt-mer" onclick="setRole('merchant')">🏪 Merchant</div>
  </div>

  <div class="checkbox-wrapper">
    <input type="checkbox" id="agree-check" class="custom-checkbox">
    <label for="agree-check" style="font-size:12px; color:var(--deep); line-height:1.5; cursor:pointer; font-weight:600;">
      By checking this, you agree to NearPop's
      <a href="terms.html"   style="color:#FF5722; font-weight:800; text-decoration:underline;">Terms</a> &amp;
      <a href="privacy.html" style="color:#FF5722; font-weight:800; text-decoration:underline;">Privacy</a>.
    </label>
  </div>

  <button class="btn-google" id="btn-login" onclick="window.loginWithGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" id="btn-google-icon" alt="Google">
    <svg id="btn-spinner"
      style="display:none; width:20px; height:20px; animation: inline-spin 1s linear infinite; flex-shrink:0;"
      viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"
        stroke-dasharray="32" stroke-linecap="round" stroke-opacity="0.3"></circle>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
    </svg>
    <span id="btn-login-text">Continue with Google</span>
  </button>

  <div style="margin-top: 24px; font-size: 11px; color: var(--gray); text-align: center; font-weight:600;">
    © 2026 NearPop. All rights reserved.
  </div>
</div>

<div class="toast" id="toast"><span id="t-ic">✅</span><span id="t-tx"></span></div>

<!-- Footer -->
<div class="page-footer">
  <a href="privacy.html" style="color:rgba(255,255,255,0.8); text-decoration:none; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,0.5);">Privacy Policy</a>
  <span style="color:rgba(255,255,255,0.5); margin:0 8px;">|</span>
  <a href="terms.html"   style="color:rgba(255,255,255,0.8); text-decoration:none; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,0.5);">Terms of Service</a>
</div>

<!-- ✅ Time-based background (non-module, runs immediately) -->
<script>
  (function setTimeBasedBackground() {
    const hour  = new Date().getHours();
    const bgEl  = document.getElementById('dynamic-bg');
    let bgUrl;

    if (hour >= 6 && hour < 12) {
      bgUrl = 'url("https://images.unsplash.com/photo-1587474260584-136574528ed5?q=80&w=1080&auto=format&fit=crop")';
    } else if (hour >= 12 && hour < 18) {
      bgUrl = 'url("https://images.unsplash.com/photo-1677306966234-367c40e489bf?q=80&w=1080&auto=format&fit=crop")';
    } else {
      bgUrl = 'url("https://images.unsplash.com/photo-1710338836955-24e16f13c1a9?q=80&w=1080&auto=format&fit=crop")';
    }

    bgEl.style.backgroundImage = bgUrl;
  })();
</script>

<!--
  ✅ FIX 7 (CRITICAL — Google Sign-In in WebView):
  Firebase's signInWithPopup() opens a new window via window.open().
  Android WebView blocks window.open() by default UNLESS both:
    a) settings.setSupportMultipleWindows(true)  — set in MainActivity ✅
    b) settings.javaScriptCanOpenWindowsAutomatically(true) — set ✅
  BUT even then, Firebase detects the "wv" substring in the default
  WebView UA and blocks OAuth with error "disallowed_useragent".

  Our MainActivity now:
  1. Strips "wv" by using a standard Chrome UA string
  2. Creates a real new WebView inside a full-screen Dialog for the popup
  3. Passes that new WebView back via WebViewTransport

  On the JS side we keep signInWithPopup() — no changes needed.
  The redirect-based fallback below is provided as a belt-and-suspenders
  option you can enable by setting USE_REDIRECT = true if popup still fails
  on specific OEM devices (Xiaomi MIUI, Oppo ColorOS etc.).
-->
<script type="module">
import { db, LS, SS, toast, cacheClear } from './js/app.js';
import {
  getAuth, GoogleAuthProvider,
  signInWithPopup, signInWithRedirect, getRedirectResult
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { app } from './js/app.js';

// ── Redirect if already signed in ────────────────────────────────────────────
if (LS('uid')) {
  const savedIntent = sessionStorage.getItem('np_intent');
  if (savedIntent) {
    sessionStorage.removeItem('np_intent');
    window.location.href = savedIntent;
  } else {
    window.location.href = LS('role') === 'merchant' ? 'merchant.html' : 'map.html';
  }
}

// ── Auth setup ────────────────────────────────────────────────────────────────
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt: 'select_account' });

window.loginRole = 'consumer';

// ── Detect if running inside Android WebView ──────────────────────────────────
// We use this to choose popup vs redirect sign-in strategy.
const UA             = navigator.userAgent;
const isAndroidWV    = /wv/.test(UA) || (UA.includes('Android') && !UA.includes('Chrome/') && !UA.includes('Firefox/'));
// Set USE_REDIRECT=true here to force redirect flow on all devices
const USE_REDIRECT   = false;
const useRedirectFlow = USE_REDIRECT || isAndroidWV;

// ── Handle redirect result (fires after page load if redirect was used) ────────
if (useRedirectFlow) {
  (async () => {
    try {
      const result = await getRedirectResult(auth);
      if (result?.user) await handleAuthSuccess(result);
    } catch (e) {
      if (e.code !== 'auth/no-current-user') {
        console.error('Redirect result error:', e);
        toast('❌', 'Login failed. Please try again.');
        resetLdr();
      }
    }
  })();
}

// ── iOS Sliding Pill ──────────────────────────────────────────────────────────
window.setRole = (r) => {
  window.loginRole = r;
  document.getElementById('rt-con').classList.toggle('on', r === 'consumer');
  document.getElementById('rt-mer').classList.toggle('on', r === 'merchant');
  document.getElementById('role-pill').style.transform =
    r === 'merchant' ? 'translateX(100%)' : 'translateX(0)';
};

// ── QR param handling ─────────────────────────────────────────────────────────
const urlP = new URLSearchParams(window.location.search);
if (urlP.get('qr') === '1') {
  document.getElementById('tag-line').innerHTML =
    "<span style='color:#FF5722;font-size:18px;font-weight:900;'>Store Found! 🏪</span><br>Sign in to unlock deals and claim visit points.";
  setRole('consumer');
  document.getElementById('role-box').style.display = 'none';
}

// ── Button state helpers ──────────────────────────────────────────────────────
function showLdr(msg) {
  const btn = document.getElementById('btn-login');
  document.getElementById('btn-google-icon').style.display = 'none';
  document.getElementById('btn-spinner').style.display    = 'block';
  document.getElementById('btn-login-text').textContent   = msg;
  btn.disabled = true;
}

function resetLdr() {
  const btn = document.getElementById('btn-login');
  document.getElementById('btn-google-icon').style.display = 'block';
  document.getElementById('btn-spinner').style.display    = 'none';
  document.getElementById('btn-login-text').textContent   = 'Continue with Google';
  btn.disabled = false;
}

// ── Core login handler ────────────────────────────────────────────────────────
window.loginWithGoogle = async () => {
  if (!document.getElementById('agree-check').checked) {
    return toast('⚠️', 'Please agree to the Terms & Privacy Policy.');
  }

  try {
    showLdr('Connecting to Google…');

    let result;
    if (useRedirectFlow) {
      // signInWithRedirect navigates away; result is handled above on reload
      await signInWithRedirect(auth, provider);
      return; // page will navigate, nothing more to do
    } else {
      result = await signInWithPopup(auth, provider);
    }

    await handleAuthSuccess(result);

  } catch (e) {
    console.error('Firebase Auth Error:', e);
    // auth/popup-closed-by-user is not really an error — user just closed it
    if (e.code !== 'auth/popup-closed-by-user') {
      toast('❌', 'Login failed. Please try again.');
    }
    resetLdr();
  }
};

// ── Shared post-auth logic ────────────────────────────────────────────────────
async function handleAuthSuccess(result) {
  const user   = result.user;
  const uid    = user.uid;
  const gName  = user.displayName || 'User';

  SS('uid', uid);
  SS('name', gName);
  SS('role', window.loginRole);

  showLdr('Signing in…');

  const userRef  = doc(db, 'users', uid);
  const userSnap = await getDoc(userRef);
  const isNewUser = !userSnap.exists();

  if (!isNewUser) {
    const existingRole = userSnap.data().role || 'consumer';
    if (existingRole !== window.loginRole) {
      await auth.signOut();
      resetLdr();
      const who = existingRole === 'consumer' ? 'Customer' : 'Merchant';
      return toast('⚠️', `This Google account is registered as a ${who}. Please select the correct role.`);
    }
  }

  if (window.loginRole === 'merchant') {
    let bname = gName + "'s Business";
    if (isNewUser) {
      bname = prompt('What is your business / shop name?') || bname;
      SS('mname', bname);
      SS('wallet', 500);
      await setDoc(userRef, { name: gName, role: 'merchant', mname: bname, wallet: 500, points: 0, liked: [], createdAt: Date.now() });
    } else {
      const d = userSnap.data();
      if (d.mname) { bname = d.mname; SS('mname', bname); }
      else { bname = prompt('What is your business / shop name?') || bname; SS('mname', bname); await updateDoc(userRef, { role: 'merchant', mname: bname }); }
      SS('wallet', d.wallet !== undefined ? d.wallet : 500);
      if (d.plan) SS('plan', d.plan);
    }
  } else {
    if (isNewUser) {
      await setDoc(userRef, { name: gName, role: 'consumer', wallet: 0, points: 50, liked: [], createdAt: Date.now() });
    }
  }

  cacheClear();

  // ── QR analytics ─────────────────────────────────────────────────────────
  const qrMid = urlP.get('mid');
  const savedIntent = sessionStorage.getItem('np_intent');

  async function trackQr(mid) {
    try {
      const field = isNewUser ? { qrNew: increment(1), qrScans: increment(1) }
                              : { qrRet: increment(1), qrScans: increment(1) };
      await updateDoc(doc(db, 'users', mid), field);
      sessionStorage.setItem('np_qr_logged_' + mid, 'true');
    } catch (err) { console.warn('QR analytics blocked:', err); }
  }

  if (qrMid) {
    await trackQr(qrMid);
  } else if (savedIntent && savedIntent.includes('utm_source=qr_standee')) {
    try {
      const base = savedIntent.startsWith('http') ? savedIntent : window.location.origin + '/' + savedIntent;
      const mid  = new URL(base).searchParams.get('mid');
      if (mid) await trackQr(mid);
    } catch (err) { console.warn('Fallback QR analytics blocked:', err); }
  }

  // ── Navigate ──────────────────────────────────────────────────────────────
  if (savedIntent) {
    sessionStorage.removeItem('np_intent');
    window.location.href = savedIntent;
  } else {
    window.location.href = window.loginRole === 'merchant'
      ? 'merchant.html?v=' + Date.now()
      : 'map.html?v='      + Date.now();
  }
}
</script>
</body>
</html>
