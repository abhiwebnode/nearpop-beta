<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="NearPop — Listing details, distance, contact, and directions.">
<meta name="theme-color" content="#0F0F13">
<meta name="color-scheme" content="light dark"> 
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NearPop — Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Syne:wght@700;800&display=swap">
<link rel="stylesheet" href="css/shared.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

#wrap { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--bg-body); }

.hero { height: 220px; display: flex; align-items: center; justify-content: center; font-size: 70px; position: relative; flex-shrink: 0; }
.hero-ov { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,.3)); }

.hero-back { position: absolute; top: 13px; left: 13px; width: 40px; height: 40px; border-radius: 12px; background: rgba(0,0,0,.38); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); color: #fff; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; text-decoration: none; font-size: 22px; }

.hero-like { position: absolute; top: 13px; right: 13px; width: 40px; height: 40px; border-radius: 12px; background: rgba(0,0,0,.38); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

/* 🚀 Share Button */
.hero-share { position: absolute; top: 13px; right: 63px; width: 40px; height: 40px; border-radius: 12px; background: rgba(0,0,0,.38); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; z-index: 10; }

.hero-badge { position: absolute; bottom: 13px; left: 13px; padding: 4px 11px; border-radius: 100px; font-size: 9px; font-weight: 800; letter-spacing: 1px; color: #fff; }

.dbody { flex: 1; overflow-y: auto; padding: 18px 16px 90px; }

.dtype { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
.dtitle { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--deep); margin-bottom: 7px; line-height: 1.2; }
.dprice { font-size: 27px; font-weight: 900; color: var(--deep); margin-bottom: 4px; }
.dprice span { font-size: 14px; font-weight: 500; color: var(--gray); }

.ddist { display: inline-flex; align-items: center; gap: 4px; background: var(--light); padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; color: var(--gray); margin-bottom: 18px; transition: background 0.2s; }
.ddist:active { background: var(--bdr); transform: scale(0.97); }

.agrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; margin-bottom: 18px; }
.ait { display: flex; align-items: center; gap: 9px; background: var(--cream); border-radius: 12px; padding: 11px; }
.ait .ai { font-size: 17px; flex-shrink: 0; }
.ait .at { font-size: 12px; font-weight: 700; color: var(--deep); }

.sec { font-size: 13px; font-weight: 800; color: var(--deep); margin-bottom: 8px; }
.desc { font-size: 14px; color: var(--gray); line-height: 1.75; font-weight: 500; margin-bottom: 18px; }

.ocard { display: flex; align-items: center; gap: 12px; background: var(--cream); border-radius: 15px; padding: 14px; margin-bottom: 18px; }
.oav { width: 48px; height: 48px; border-radius: 13px; background: var(--or); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.oname { font-size: 14px; font-weight: 800; color: var(--deep); margin-bottom: 1px; }
.otag { font-size: 11px; color: var(--gray); font-weight: 600; }
.ovrf { font-size: 11px; color: var(--grn); font-weight: 700; margin-top: 2px; }

.dfooter { padding: 13px 14px; border-top: 1px solid var(--bdr); display: flex; gap: 9px; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-app); }
.dact { flex: 1; padding: 14px; border-radius: 13px; font-size: 14px; font-weight: 800; border: none; cursor: pointer; }
.dact.p { background: var(--or); color: #fff; box-shadow: 0 4px 14px rgba(255,87,34,.26); }
.dact.s { background: var(--light); color: var(--deep); }

.not-found { text-align: center; padding: 60px 24px; }
.not-found .em { font-size: 52px; margin-bottom: 13px; }
.not-found h2 { font-size: 19px; font-weight: 800; margin-bottom: 6px; color: var(--deep); }
.not-found p { font-size: 14px; color: var(--gray); line-height: 1.5; }

/* Footfall Engine UI */
.footfall-bar { background: linear-gradient(135deg, #10B981, #059669); color: #fff; padding: 13px 16px; border-radius: 13px; margin-bottom: 14px; display: none; }
.footfall-bar.on { display: block; animation: tin .4s ease; }
@keyframes tin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.ff-title { font-size: 13px; font-weight: 800; margin-bottom: 3px; }
.ff-sub { font-size: 11px; opacity: .85; margin-bottom: 9px; }
.ff-progress { background: rgba(255,255,255,.25); border-radius: 4px; height: 6px; margin-bottom: 9px; }
.ff-bar { background: #fff; border-radius: 4px; height: 6px; transition: width 1s linear; }
.ff-btn { background: #fff; color: #059669; padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 800; font-family: inherit; cursor: pointer; border: none; }

.exp-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-bottom: 12px; }
.exp-active { background: rgba(16, 185, 129, 0.1); color: var(--grn); }
.exp-soon { background: rgba(245, 158, 11, 0.1); color: var(--or); }
.exp-expired { background: rgba(239, 68, 68, 0.1); color: #EF4444; }
.exp-unlimited { background: rgba(16, 185, 129, 0.1); color: var(--grn); font-weight: 800; }

/* 🚀 Skeletons */
.skeleton {
  background: #E5E7EB;
  background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite linear;
  border-radius: 8px;
}
@keyframes shimmer { 
  0% { background-position: 200% 0; } 
  100% { background-position: -200% 0; } 
}

/* 🚀 Pulsing FOMO Badge */
.fomo-badge {
  position: absolute; top: 10px; left: 10px;
  background: #EF4444; color: #fff; font-size: 10px; font-weight: 900;
  padding: 4px 8px; border-radius: 6px; z-index: 5; letter-spacing: 0.5px;
  box-shadow: 0 4px 10px rgba(239,68,68,0.4);
  animation: fomo-pulse 1.5s infinite;
}
@keyframes fomo-pulse {
  0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
  70% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}
</style>
</head>
<body>
<div id="app-shell"><div id="wrap">
  <div class="hero" id="hero">
    <div class="hero-ov"></div>
    <span id="d-em" style="position:relative;z-index:1">🏠</span>
    <button class="hero-back" onclick="window.location.href='map.html'" aria-label="Go home">🏠</button>
    <button class="hero-share" id="d-share" onclick="shareListing()" aria-label="Share listing">📤</button>
    <button class="hero-like" id="d-like" onclick="toggleLike()" aria-label="Save listing">🤍</button>
    <div class="hero-badge" id="d-badge">RENTAL</div>
  </div>

  <div class="dbody" id="dbody">
    <div style="padding: 10px 4px;">
      <div class="skeleton" style="width:80px; height:20px; border-radius:100px; margin-bottom:14px;"></div>
      <div class="skeleton" style="width:95%; height:32px; margin-bottom:8px;"></div>
      <div class="skeleton" style="width:60%; height:32px; margin-bottom:20px;"></div>
      <div class="skeleton" style="width:140px; height:24px; border-radius:100px; margin-bottom:24px;"></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px;">
        <div class="skeleton" style="height:44px; border-radius:12px;"></div>
        <div class="skeleton" style="height:44px; border-radius:12px;"></div>
      </div>
      <div class="skeleton" style="width:120px; height:20px; margin-bottom:12px;"></div>
      <div class="skeleton" style="width:100%; height:16px; margin-bottom:8px;"></div>
      <div class="skeleton" style="width:100%; height:16px; margin-bottom:8px;"></div>
      <div class="skeleton" style="width:80%; height:16px; margin-bottom:24px;"></div>
    </div>
  </div>

  <div class="dfooter" id="dfooter" style="display:none">
    <button class="dact s" onclick="openContact()">💬 Contact</button>
    <button class="dact p" id="d-cta">📅 Visit</button>
  </div>
</div>

<div class="modal" id="mod-contact" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="msht">
    <div class="mh"></div>
    <div class="mt">💬 Contact</div>
    <div id="contact-body" style="background:var(--cream);border-radius:12px;padding:14px;margin-bottom:16px;font-size:14px;font-weight:600;line-height:1.7;color:var(--deep)"></div>
    <button class="btn-or" id="btn-call">📞 Call Now</button>
    <button class="btn-grn" id="btn-wa" style="width:100%;padding:14px;border-radius:14px;background:#10B981;color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:inherit;margin-top:10px;">💚 WhatsApp</button>
  </div>
</div>
<div class="toast" id="toast"><span id="t-ic">✅</span><span id="t-tx"></span></div>
</div>

<script type="module">
// 🚀 Removed broken import from notifications.js
import { db, LS, SS, TC, TE, distM, fmtDist, isExpired, toast, addPts } from './js/app.js';
import { syncField } from './js/userSync.js';
import { getDocs, query, collection, orderBy, doc, getDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

if (!LS('uid')) { 
  sessionStorage.setItem('np_intent', window.location.href); 
  window.location.href = 'index.html'; 
}

// 🚀 Local fallback for Engagement Analytics
function trackEng(id, delta) {
  try {
    if (LS('uid')) {
      updateDoc(doc(db, 'users', LS('uid')), { ['eng_' + id]: increment(delta) }).catch(()=>{});
    }
  } catch(e) {}
}

const CTAS = { deal: '🛍️ Claim Offer', rental: '📞 Contact Owner', pg: '📞 Contact PG', job: '📝 Apply Now' };
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
let listing = null;

async function load() {
  if (!id) { showNotFound(); return; }
  try {
    const snap = await getDoc(doc(db, 'listings', id));
    if (snap.exists()) {
      listing = { id: snap.id, ...snap.data() };
      render(listing);
      
      // QR Standee Analytics
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('utm_source') === 'qr_standee' && listing.uid) {
        updateDoc(doc(db, 'users', listing.uid), { qrOpens: increment(1) }).catch(e => console.warn("Analytics Error:", e));
      }
    } else {
      showNotFound();
    }
  } catch(e) {
    showNotFound();
  }
}

function render(l) {
  const imgUrl = l.imageUrl || l.image;
  if (imgUrl) {
    document.getElementById('hero').style.background = `#ffffff url('${imgUrl}') center/contain no-repeat`;
    document.getElementById('d-em').style.display = 'none'; 
  } else {
    document.getElementById('hero').style.background = l.bg || 'linear-gradient(135deg,#667eea,#764ba2)';
    document.getElementById('d-em').textContent = l.emoji || TE(l.type);
    document.getElementById('d-em').style.display = 'inline';
  }

  document.getElementById('d-badge').textContent = (l.type || '').toUpperCase();
  document.getElementById('d-badge').style.background = l.color || TC(l.type);

  const liked = new Set(LS('liked') || []);
  document.getElementById('d-like').textContent = liked.has(id) ? '❤️' : '🤍';

  let distTxt = '—';
  const loc = LS('lastLoc');
  if (loc && l.lat) {
    const d = distM(loc.lat, loc.lng, l.lat, l.lng);
    distTxt = d < 1000 ? Math.round(d) + 'm' : (d / 1000).toFixed(1) + 'km';
  }

  const amens = (l.amenities || []).map(a => {
    const ic = typeof a === 'object' ? a.ic : a[0];
    const lb = typeof a === 'object' ? a.lb : a[1];
    return `<div class="ait"><span class="ai">${ic}</span><span class="at">${lb}</span></div>`;
  }).join('');

  // 🚀 FOMO Expiry Logic Maintained
  let expiryHTML = '';
  if (!l.expiryDate) {
    expiryHTML = `<div class="exp-badge exp-unlimited">♾️ Unlimited Premium Deal</div>`;
  } else {
    const exp = new Date(l.expiryDate);
    const now = new Date();
    const hrsLeft = (exp - now) / 3600000;
    const daysLeft = Math.ceil(hrsLeft / 24);
    
    if (hrsLeft < 0) {
      expiryHTML = `<div class="exp-badge exp-expired">❌ Expired</div>`;
    } else if (hrsLeft <= 24) {
      expiryHTML = `<div class="fomo-badge" style="position:relative; top:0; left:0; display:inline-block; margin-bottom:12px;">🔥 Ends in ${Math.ceil(hrsLeft)} hours!</div>`;
    } else if (daysLeft <= 7) {
      expiryHTML = `<div class="exp-badge exp-soon">⏰ Expires in ${daysLeft} day${daysLeft === 1 ? '' : 's'}</div>`;
    } else {
      expiryHTML = `<div class="exp-badge exp-active">✅ Valid until ${exp.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</div>`;
    }
  }

  document.getElementById('dbody').innerHTML = `
    ${expiryHTML}
    <div class="dtype" style="color:${l.color || TC(l.type)}">${(l.type || '').toUpperCase()}</div>
    <div class="dtitle">${l.title || ''}</div>
    <div class="dprice">${l.price || ''} <span>${l.priceLabel || ''}</span></div>
    
    <div class="ddist" style="cursor:pointer;" onclick="openGoogleMaps(${l.lat}, ${l.lng})">
      📍 ${distTxt} from you <span style="color:var(--blue); margin-left:3px">↗</span>
    </div>

    ${amens ? `<div class="agrid">${amens}</div>` : ''}
    <div class="sec">About this listing</div>
    <div class="desc">${l.desc || ''}</div>
    <div class="sec">Posted by</div>
    <div class="ocard">
      <div class="oav">${l.ownerEmoji || '🏪'}</div>
      <div>
        <div class="oname">${l.owner || ''}</div>
        <div class="otag">${l.ownerTag || ''}</div>
        ${l.verified !== false ? '<div class="ovrf">✅ Verified on NearPop</div>' : ''}
      </div>
    </div>
  `;

  document.getElementById('d-cta').textContent = CTAS[l.type] || '📅 Contact';
  document.getElementById('dfooter').style.display = 'flex';

  document.title = l.title || 'NearPop';

  injectFootfallBanner();
}

function showNotFound() {
  document.getElementById('dbody').innerHTML = `<div class="not-found"><div class="em">🔍</div><h2>Listing not found</h2><button onclick="window.location.href='map.html'" style="margin-top:18px;padding:13px 24px;background:#FF5722;color:#fff;border-radius:12px;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:inherit">Go to Map</button></div>`;
}

// 🚀 Native Share API Maintained Safely
window.shareListing = async () => {
  if (!listing) return;
  const shareData = {
    title: listing.title || 'NearPop Deal',
    text: `Check out "${listing.title}" on NearPop!`,
    url: window.location.href
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
      trackEng(id, 10); 
    } catch (err) {
      console.log('Share sheet closed');
    }
  } else {
    navigator.clipboard.writeText(window.location.href);
    toast('🔗', 'Link copied to clipboard!');
  }
};

window.openGoogleMaps = (destLat, destLng) => {
  if (!destLat || !destLng) return toast('⚠️', 'Location coordinates missing.');
  const loc = LS('lastLoc');
  let url = (loc && loc.lat && loc.lng) ? `https://www.google.com/maps/dir/?api=1&origin=${loc.lat},${loc.lng}&destination=${destLat},${destLng}&travelmode=walking` : `https://www.google.com/maps/search/?api=1&query=${destLat},${destLng}`;
  trackEng(id, 10);
  window.open(url, '_blank');
};

window.toggleLike = () => {
  const liked = new Set(LS('liked') || []);
  liked.has(id) ? liked.delete(id) : liked.add(id);
  SS('liked', [...liked]);
  document.getElementById('d-like').textContent = liked.has(id) ? '❤️' : '🤍';
  if (liked.has(id)) {
    addPts(10); trackEng(id, 10); toast('❤️', 'Saved! +10 points');
    syncField(LS('uid'), 'liked', [...liked]); syncField(LS('uid'), 'points', LS('points') || 0);
  } else {
    trackEng(id, -10); syncField(LS('uid'), 'liked', [...liked]);
  }
};

window.openContact = () => {
  if (!listing) return;
  trackEng(id, 8); 
  
  updateDoc(doc(db, 'listings', id), { visits: increment(1) }).catch(e => console.warn(e));
  
  document.getElementById('contact-body').innerHTML = `<strong style="color:var(--deep)">${listing.owner || ''}</strong><br><span style="color:var(--gray)">${listing.ownerTag || ''}</span><br><br>📞 <strong style="color:var(--deep)">${listing.contact || 'Contact via NearPop'}</strong>`;
  document.getElementById('btn-call').onclick = () => { if (listing.contact) window.open('tel:' + listing.contact); trackEng(id, 5); };
  
  // 🚀 NEW: Dynamic WhatsApp Pre-filled Message
  document.getElementById('btn-wa').onclick = () => { 
    if (listing.contact) {
      const message = encodeURIComponent(`Hi! I saw your offer for '${listing.title || 'your shop'}' on NearPop. Is this still available?`);
      window.open('https://wa.me/' + listing.contact.replace(/\D/g, '') + '?text=' + message); 
    }
    trackEng(id, 15); 
    addPts(5); 
  };

  document.getElementById('mod-contact').classList.add('on');
  addPts(5);
};

document.getElementById('d-cta').onclick = window.openContact;

// 🚀 FOOTFALL VERIFICATION ENGINE MAINTAINED SAFELY
let ffTimer = null;
let ffSeconds = 0;
const FF_REQUIRED = 5; 

function startFootfallTracking() {
  if (!LS('uid')) return; 
  if (!listing || !listing.lat) return;
  const loc = LS('lastLoc');
  if (!loc) return;
  
  const d = distM(loc.lat, loc.lng, listing.lat, listing.lng);
  if (d > 50) return; // Must be within 50 meters
  
  const bar = document.getElementById('ff-bar');
  const ffBanner = document.getElementById('ff-banner');
  if (!ffBanner) return;
  
  ffBanner.classList.add('on');
  ffSeconds = 0;
  clearInterval(ffTimer);

  ffTimer = setInterval(() => {
    ffSeconds++;
    const pct = Math.round((ffSeconds / FF_REQUIRED) * 100);
    if (bar) bar.style.width = pct + '%';
    
    const rem = FF_REQUIRED - ffSeconds;
    const el = document.getElementById('ff-time');
    if (el) el.textContent = rem > 0 ? rem + 's remaining…' : 'Verifying…';
    
    if (ffSeconds >= FF_REQUIRED) { 
      clearInterval(ffTimer); 
      confirmFootfall(); 
    }
  }, 1000);
}

function confirmFootfall() {
  const ffBanner = document.getElementById('ff-banner');
  if (ffBanner) {
    ffBanner.innerHTML = `<div class="ff-title">✅ Visit Confirmed!</div><div class="ff-sub">You've been verified at ${listing.owner || 'this location'}. Reward points added!</div><button class="ff-btn" onclick="claimVisitReward()">🎁 Claim +50 Points</button>`;
  }
  addPts(50);
  syncField(LS('uid'), 'points', LS('points') || 0);
  trackEng(id, 20); 
  updateDoc(doc(db, 'listings', id), { visits: increment(1) }).catch(e => console.warn(e));
  toast('🏪', 'Visit confirmed! +50 points earned');
  
  const fv = LS('footfall_verified') || {}; 
  fv[id] = Date.now(); 
  SS('footfall_verified', fv);
}

window.claimVisitReward = () => { toast('🎉', 'Reward claimed! Check your points in Profile'); };

function injectFootfallBanner() {
  if (!LS('uid')) return; 
  const dbody = document.getElementById('dbody');
  if (!dbody || document.getElementById('ff-banner')) return;
  
  const div = document.createElement('div');
  div.id = 'ff-banner';
  div.className = 'footfall-bar';
  div.innerHTML = `<div class="ff-title">📍 You're nearby — verifying your visit</div><div class="ff-sub" id="ff-time">Stay within 50m for 5 Seconds to earn rewards</div><div class="ff-progress"><div class="ff-bar" id="ff-bar" style="width:0%"></div></div><button class="ff-btn" onclick="document.getElementById('ff-banner').classList.remove('on');clearInterval(ffTimer)">Not visiting now</button>`;
  
  dbody.insertBefore(div, dbody.firstChild);
  setTimeout(startFootfallTracking, 3000);
}

const auth = getAuth();
onAuthStateChanged(auth, (user) => { if (user) { trackEng(id || '', 8); } });

load();

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(p => {
    SS('lastLoc', { lat: p.coords.latitude, lng: p.coords.longitude });
    if (listing) {
      document.querySelector('.ddist').innerHTML = `📍 ${Math.round(distM(p.coords.latitude, p.coords.longitude, listing.lat, listing.lng))}m from you <span style="color:var(--blue); margin-left:3px">↗</span>`;
    }
    startFootfallTracking();
  });
}
</script>
</body>
</html>
